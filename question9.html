<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="product-card">
        <div class="product-image-container">
            
            <img src="https://cdn.shopify.com/s/files/1/0057/8938/4802/files/Rockerz_650_pp_renders_main_banner.124.png?v=1740735495&width=400" alt="Wireless Headphones" class="product-image">
            <span class="sale-badge">Sale</span>
        </div>
        <div class="product-details">
            <h1 class="product-title">Wireless Headphones</h1>
            <p class="product-description">High quality wireless headphones with noise cancellation.</p>
            <p class="product-price">₹2,999</p>
            <div class="button-group">
                <button class="btn add-to-cart">Add to Cart</button>
                <button class="btn buy-now">Buy Now</button>
            </div>
        </div>
    </div>
</body>
<style>
    body {
    background-color: #f0f0f0; 
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
}

.product-card {
    background-color: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    width: 300px;
    overflow: hidden;
    text-align: left;
}

.product-image-container {
    position: relative;
    padding: 20px;
    text-align: center; 
}

.product-image {
    max-width: 100%;
    height: auto;
    display: block;
}

.sale-badge {
    position: absolute;
    top: 0;
    right: 0;
    background-color: #e53935; 
    color: white;
    padding: 5px 15px;
    font-size: 14px;
    font-weight: bold;
    border-radius: 0 10px 0 0; 
}

.product-details {
    padding: 20px;
}

.product-title {
    font-size: 18px;
    font-weight: bold;
    margin: 0 0 10px 0;
    color: #333;
}

.product-description {
    font-size: 14px;
    color: #666;
    margin: 0 0 15px 0;
    line-height: 1.4;
}

.product-price {
    font-size: 24px;
    font-weight:"bold";
    color: #333;
    margin: 0 0 20px 0;
}

.button-group {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.btn {
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    flex-grow: 1;
}

.add-to-cart {
    background-color: #eee; 
    color: #333;
}

.buy-now {
    background-color: #000; 
    color: white;
}

</style>
</html>
